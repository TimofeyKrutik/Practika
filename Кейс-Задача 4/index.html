<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Счётчик до Нового года</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Сколько осталось до Нового года?</h1>
        
        <input type="text" id="dateInput" placeholder="Введите дату в формате дд.мм.гггг" class="input-field">
        
        <button id="calculateBtn" class="btn">Рассчитать</button>
        
        <div id="daysResult" class="result-box days-box">
            — дней до Нового года —
        </div>
        
        <div id="leapResult" class="result-box leap-box">
            — информация о годе —
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
